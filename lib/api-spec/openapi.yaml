openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Hotel Las Vegas Reservation Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: rooms
    description: Room management
  - name: employees
    description: Employee management
  - name: guests
    description: Guest management
  - name: reservations
    description: Reservation management
  - name: dashboard
    description: Dashboard statistics
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /rooms:
    get:
      operationId: listRooms
      tags: [rooms]
      summary: List all rooms
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of rooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Room"
    post:
      operationId: createRoom
      tags: [rooms]
      summary: Create a room
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /rooms/{id}:
    get:
      operationId: getRoom
      tags: [rooms]
      summary: Get a room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "404":
          description: Not found
    patch:
      operationId: updateRoom
      tags: [rooms]
      summary: Update a room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoomUpdate"
      responses:
        "200":
          description: Updated room
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"
        "404":
          description: Not found
    delete:
      operationId: deleteRoom
      tags: [rooms]
      summary: Delete a room
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      description: |
        Unconditionally public — no authentication or ACL checks.
        Searches PUBLIC_OBJECT_SEARCH_PATHS for the given file path.
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: Relative file path within the public search paths.
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      description: |
        Serves object entities uploaded via presigned URLs. These can optionally
        be protected with authentication or ACL checks based on the use case.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/login-by-phone:
    post:
      operationId: loginByPhone
      tags: [auth]
      summary: Log in with an employee phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginByPhoneRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "404":
          description: No employee found with this phone number

  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      summary: List all employees
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      summary: Create an employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    get:
      operationId: getEmployee
      tags: [employees]
      summary: Get an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found
    patch:
      operationId: updateEmployee
      tags: [employees]
      summary: Update an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeUpdate"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "404":
          description: Not found
    delete:
      operationId: deleteEmployee
      tags: [employees]
      summary: Delete an employee
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /guests:
    get:
      operationId: listGuests
      tags: [guests]
      summary: List all guests
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of guests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guest"
    post:
      operationId: createGuest
      tags: [guests]
      summary: Create a guest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"

  /guests/{id}:
    get:
      operationId: getGuest
      tags: [guests]
      summary: Get a guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Guest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
        "404":
          description: Not found
    patch:
      operationId: updateGuest
      tags: [guests]
      summary: Update a guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestUpdate"
      responses:
        "200":
          description: Updated guest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"
        "404":
          description: Not found
    delete:
      operationId: deleteGuest
      tags: [guests]
      summary: Delete a guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /reservations:
    get:
      operationId: listReservations
      tags: [reservations]
      summary: List all reservations
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: employeeId
          in: query
          required: false
          schema:
            type: integer
        - name: roomId
          in: query
          required: false
          schema:
            type: integer
        - name: checkInDate
          in: query
          required: false
          schema:
            type: string
        - name: checkOutDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of reservations with full details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReservationDetail"
    post:
      operationId: createReservation
      tags: [reservations]
      summary: Create a reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationDetail"
        "400":
          description: Bad request or room not available

  /reservations/{id}:
    get:
      operationId: getReservation
      tags: [reservations]
      summary: Get a reservation with full details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reservation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationDetail"
        "404":
          description: Not found
    patch:
      operationId: updateReservation
      tags: [reservations]
      summary: Update a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationUpdate"
      responses:
        "200":
          description: Updated reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteReservation
      tags: [reservations]
      summary: Delete a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /reservations/{id}/checkin:
    patch:
      operationId: checkInReservation
      tags: [reservations]
      summary: Check in a guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationDetail"
        "404":
          description: Not found

  /reservations/{id}/checkout:
    patch:
      operationId: checkOutReservation
      tags: [reservations]
      summary: Check out a guest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationDetail"
        "404":
          description: Not found

  /reservations/{id}/cancel:
    patch:
      operationId: cancelReservation
      tags: [reservations]
      summary: Cancel a reservation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationDetail"
        "404":
          description: Not found

  /reservations/export/csv:
    get:
      operationId: exportReservationsCSV
      tags: [reservations]
      summary: Export all reservations as CSV for Google Sheets
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: startDate
          in: query
          required: false
          schema:
            type: string
        - name: endDate
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/occupancy:
    get:
      operationId: getRoomOccupancy
      tags: [dashboard]
      summary: Get room occupancy breakdown by type and status
      responses:
        "200":
          description: Room occupancy data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OccupancyItem"

  /dashboard/recent-reservations:
    get:
      operationId: getRecentReservations
      tags: [dashboard]
      summary: Get the 10 most recent reservations
      responses:
        "200":
          description: Recent reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReservationDetail"

  /dashboard/employee-stats:
    get:
      operationId: getEmployeeStats
      tags: [dashboard]
      summary: Get reservation count per employee
      responses:
        "200":
          description: Employee statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmployeeStatItem"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Room:
      type: object
      required: [id, number, type, floor, status, pricePerNight, createdAt]
      properties:
        id:
          type: integer
        number:
          type: string
        type:
          type: string
        floor:
          type: integer
        status:
          type: string
        pricePerNight:
          type: number
        description:
          type: ["string", "null"]
        createdAt:
          type: string

    RoomInput:
      type: object
      required: [number, type, floor, pricePerNight]
      properties:
        number:
          type: string
        type:
          type: string
        floor:
          type: integer
        pricePerNight:
          type: number
        description:
          type: string

    RoomUpdate:
      type: object
      properties:
        number:
          type: string
        type:
          type: string
        floor:
          type: integer
        status:
          type: string
        pricePerNight:
          type: number
        description:
          type: string

    LoginByPhoneRequest:
      type: object
      required: [phone, password]
      properties:
        phone:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      required: [token, employee]
      properties:
        token:
          type: string
        employee:
          $ref: "#/components/schemas/Employee"

    Employee:
      type: object
      required: [id, name, role, phone, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [admin, employee]
        phone:
          type: string
        email:
          type: ["string", "null"]
        createdAt:
          type: string

    EmployeeInput:
      type: object
      required: [name, role, phone, password]
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, employee]
        phone:
          type: string
        email:
          type: string
        password:
          type: string

    EmployeeUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, employee]
        phone:
          type: string
        email:
          type: string
        password:
          type: string

    Guest:
      type: object
      required: [id, name, phone, nationalId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        nationalId:
          type: string
        email:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        createdAt:
          type: string

    GuestInput:
      type: object
      required: [name, phone, nationalId]
      properties:
        name:
          type: string
        phone:
          type: string
        nationalId:
          type: string
        email:
          type: string
        nationality:
          type: string

    GuestUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        nationalId:
          type: string
        email:
          type: string
        nationality:
          type: string

    ReservationDetail:
      type: object
      required: [id, roomId, guestId, employeeId, checkInDate, checkOutDate, status, totalAmount, paymentReceiptNumber, createdAt, room, guest, employee]
      properties:
        id:
          type: integer
        roomId:
          type: integer
        guestId:
          type: integer
        employeeId:
          type: integer
        checkInDate:
          type: string
        checkOutDate:
          type: string
        status:
          type: string
        totalAmount:
          type: number
        paymentReceiptNumber:
          type: string
        receiptImageUrl:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        room:
          $ref: "#/components/schemas/Room"
        guest:
          $ref: "#/components/schemas/Guest"
        employee:
          $ref: "#/components/schemas/Employee"

    ReservationInput:
      type: object
      required: [roomId, guestId, employeeId, checkInDate, checkOutDate, paymentReceiptNumber]
      properties:
        roomId:
          type: integer
        guestId:
          type: integer
        employeeId:
          type: integer
        checkInDate:
          type: string
        checkOutDate:
          type: string
        totalAmount:
          type: number
        paymentReceiptNumber:
          type: string
        receiptImageUrl:
          type: string
        notes:
          type: string

    ReservationUpdate:
      type: object
      properties:
        roomId:
          type: integer
        guestId:
          type: integer
        employeeId:
          type: integer
        checkInDate:
          type: string
        checkOutDate:
          type: string
        totalAmount:
          type: number
        paymentReceiptNumber:
          type: string
        notes:
          type: string
        status:
          type: string

    DashboardStats:
      type: object
      required: [totalRooms, occupiedRooms, availableRooms, reservedRooms, totalReservations, activeReservations, todayCheckIns, todayCheckOuts, monthlyRevenue, totalRevenue]
      properties:
        totalRooms:
          type: integer
        occupiedRooms:
          type: integer
        availableRooms:
          type: integer
        reservedRooms:
          type: integer
        totalReservations:
          type: integer
        activeReservations:
          type: integer
        todayCheckIns:
          type: integer
        todayCheckOuts:
          type: integer
        monthlyRevenue:
          type: number
        totalRevenue:
          type: number

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    OccupancyItem:
      type: object
      required: [type, total, occupied, available]
      properties:
        type:
          type: string
        total:
          type: integer
        occupied:
          type: integer
        available:
          type: integer

    EmployeeStatItem:
      type: object
      required: [employeeId, employeeName, role, totalReservations, activeReservations]
      properties:
        employeeId:
          type: integer
        employeeName:
          type: string
        role:
          type: string
        totalReservations:
          type: integer
        activeReservations:
          type: integer
